services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hydro-pacifique-web
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8084:80"
    environment:
      DB_SERVER: db
      DB_SERVER_USERNAME: root
      DB_SERVER_PASSWORD: ""
      DB_DATABASE: hp-data-demo-spc
    volumes:
      - ./web_app:/var/www/html
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: hydro-pacifique-db
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8
      - --collation-server=utf8_general_ci
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_ROOT_HOST: "%"
      MYSQL_DATABASE: hp-data-demo-spc
      TZ: Pacific/Auckland
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database:/seed:ro
      - ./docker/mysql/init/00-import-demo.sh:/docker-entrypoint-initdb.d/00-import-demo.sh:ro
    restart: unless-stopped

volumes:
  mysql_data:
